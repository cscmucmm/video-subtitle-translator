<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字幕翻译设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 字幕翻译</h1>
      <label class="switch">
        <input type="checkbox" id="enabled">
        <span class="slider"></span>
      </label>
    </header>

    <main>
      <div class="field">
        <label for="targetLang">目标语言</label>
        <select id="targetLang">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>

      <div class="field">
        <label for="apiProvider">翻译服务</label>
        <select id="apiProvider">
          <option value="google">Google 翻译（免费）</option>
          <option value="deepl">DeepL（需 API Key）</option>
          <option value="openai">OpenAI GPT（需 API Key）</option>
        </select>
      </div>

      <div class="field" id="apiKeyField" style="display: none;">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="输入你的 API Key">
      </div>

      <div class="field">
        <label class="checkbox">
          <input type="checkbox" id="showOriginal">
          <span>显示原文</span>
        </label>
      </div>

      <div class="field">
        <label for="fontSize">字体大小: <span id="fontSizeValue">16</span>px</label>
        <input type="range" id="fontSize" min="12" max="24" value="16">
      </div>
    </main>

    <footer>
      <button id="save">保存设置</button>
      <span id="status"></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
